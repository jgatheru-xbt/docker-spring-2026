# exercise 2.7 
services:
  nginx:
    image: nginx
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
    - "8000:80"
    environment:
    - NGINX_HOST=https://localhost:8000
    - NGINX_PORT=80
# VIRTUAL_HOST -> use this to define the domain name that routes to your container 
# VIRTUAL_PORT -> to specify the internal port the container listens to


  backend:
    build: ./example-backend
    container_name: backend
    environment:
      - PORT=8080
      - REQUEST_ORIGIN=http://localhost
      - REDIS_HOST=redis-cache
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=example-password
      - POSTGRES_USER=postgres
      - POSTGRES_DATABASE=postgres
    # ports:
    #   - 8080

  frontend:
    build: ./example-frontend
    container_name: frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000/api/
    # ports:
    #   - 5001

  redis-cache:
    image: redis:alpine
    volumes:
      - redis_data:/data
    container_name: redis-cache

  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: example-password
    volumes:
      - ./postgresql:/var/lib/postgresql


volumes:
  redis_data:
  # db_data:
